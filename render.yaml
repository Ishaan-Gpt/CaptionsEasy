services:
  - type: web
    name: motionai-backend
    runtime: docker
    dockerfilePath: ./apps/backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    # preDeployCommand (alembic upgrade head) isn't supported on the free
    # plan. Migrations are run manually (`alembic upgrade head` against the
    # real DATABASE_URL) before each deploy that adds one — already done for
    # everything currently on main.
    #
    # Render's free tier has no Background Worker service type at all, so
    # there is no separate motionai-worker service — RUN_WORKER_INLINE=true
    # makes this same process also run the Celery worker loop in a
    # background thread (see app.main._start_inline_worker). It sleeps
    # along with this free web service after ~15min of no HTTP traffic,
    # same as the API itself; move to a paid plan + separate worker service
    # later if jobs need to process while the API is idle.
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: RUN_WORKER_INLINE
        value: "true"
      # REDIS_URL is the existing Upstash Redis instance already used in
      # local dev (apps/backend/.env) — no separate Render-managed Redis is
      # provisioned, since Upstash's free tier already covers this and a
      # second Redis would be redundant cost/complexity.
      #
      # Everything below has no safe default and must be set manually in
      # the Render dashboard (real values already live in apps/backend/.env):
      # REDIS_URL, DATABASE_URL_ASYNC, DATABASE_URL, SUPABASE_JWT_SECRET,
      # SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, SUPABASE_STORAGE_BUCKET,
      # GROQ_API_KEY, CORS_ALLOW_ORIGINS (the Vercel frontend URL),
      # SPEECH_PROVIDER_NAME=groq, CREATIVE_PROVIDER_NAME=groq,
      # CAPTION_PROVIDER_NAME=groq.
